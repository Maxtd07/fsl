
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
# create-drop: crea le tabelle all'avvio e le elimina all'arresto (utile per test)
# update: crea le tabelle se non esistono, aggiorna lo schema (default per sviluppo)
# validate: valida lo schema senza modificarlo (consigliato per produzione)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Ensure schema is created before data.sql is executed
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

