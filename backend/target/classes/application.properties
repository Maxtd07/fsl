server.port=${PORT:8080}

# MySQL Database Configuration
spring.datasource.url=${APP_DB_URL:jdbc:mysql://localhost:3306/soccerdreamfermana?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
app.frontend.base-url=http://localhost:5173
app.jwt.secret=${APP_JWT_SECRET:ChangeThisJwtSecretKeyForDevelopment1234567890}
app.jwt.expiration-ms=86400000
app.mail.from=${APP_MAIL_FROM:noreply@soccerdreamfermana.local}
app.mail.contact.to=${APP_MAIL_CONTACT_TO:}

facebook.page.id=${FACEBOOK_PAGE_ID:1117449661446260}
facebook.access.token=${FACEBOOK_ACCESS_TOKEN:}

paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
paypal.currency=${PAYPAL_CURRENCY:EUR}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

logging.level.root=INFO
logging.level.com.soccerdreamfermana=DEBUG
logging.level.com.soccerdreamfermana.service.impl.FacebookServiceImpl=DEBUG
